<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Thanx Ma">
  <!-- Charcoal rounded background — keeps the mark legible on any browser tab -->
  <rect width="64" height="64" rx="10" fill="#120F0B"/>

  <!-- Top accent diamond -->
  <path d="M32 6 L36 10 L32 14 L28 10 Z" fill="#C9A44F"/>

  <!-- Outer diamond outline -->
  <path d="M32 14 L52 32 L32 50 L12 32 Z"
        fill="none" stroke="#C9A44F" stroke-width="2"/>

  <!-- Beaded ring — eight dots placed around the outer diamond -->
  <g fill="#C9A44F">
    <circle cx="32" cy="11.5" r="0.9"/>
    <circle cx="42"  cy="22"   r="0.9"/>
    <circle cx="52.5" cy="32"  r="0.9"/>
    <circle cx="42"  cy="42"   r="0.9"/>
    <circle cx="32"  cy="52.5" r="0.9"/>
    <circle cx="22"  cy="42"   r="0.9"/>
    <circle cx="11.5" cy="32"  r="0.9"/>
    <circle cx="22"  cy="22"   r="0.9"/>
  </g>

  <!-- Inner diamond outline -->
  <path d="M32 22 L42 32 L32 42 L22 32 Z"
        fill="none" stroke="#C9A44F" stroke-width="1.6"/>

  <!-- Centre diamond -->
  <path d="M32 30 L34 32 L32 34 L30 32 Z" fill="#C9A44F"/>

  <!-- Bottom accent diamond -->
  <path d="M32 54 L36 58 L32 62 L28 58 Z" fill="#C9A44F"/>
</svg>
